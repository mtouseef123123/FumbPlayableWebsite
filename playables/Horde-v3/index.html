<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle Mine • Playable</title>
    <style>
        body {
            margin: 0;
            background: #0f0f11;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #e5e7eb;
            overflow-x: hidden;
        }

        #control-bar {
            position: sticky;
            top: 0;
            z-index: 9999;
            background: #18181b;
            border-bottom: 1px solid #27251f;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 13px;
        }

        .main-container {
            display: flex;
            gap: 24px;
            padding: 24px;
            max-width: 1200px;
            margin: 0 auto;
            align-items: center;
            min-height: calc(100vh - 52px);
            box-sizing: border-box;
        }

        .playable-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 100px);
        }

        .device-frame {
            position: relative;
            padding: 18px;
            border-radius: 42px;
            background: linear-gradient(145deg, #2b2b31, #111114);
            box-shadow:
                0 25px 60px rgba(0,0,0,0.55),
                inset 0 2px 4px rgba(255,255,255,0.06),
                inset 0 -4px 8px rgba(0,0,0,0.5);
        }

        #game-frame {
            width: 100%;
            max-width: 380px;
            height: 640px;
            border: none;
            border-radius: 28px;
            overflow: hidden;
            display: block;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.6);
            background: #000;
            transition: all 0.3s ease;
        }

        .landscape {
            max-width: 720px;
            height: 405px;
            border-radius: 24px;
        }

        .qr-sidebar {
            width: 220px;
            background: #18181b;
            border: 1px solid #27251f;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .qr-sidebar img {
            width: 180px;
            height: 180px;
            border-radius: 12px;
            background: white;
            padding: 8px;
            margin-bottom: 12px;
        }

        .qr-sidebar h3 {
            margin: 0 0 8px 0;
            font-size: 15px;
            color: #f3e8ff;
        }

        .qr-sidebar p {
            margin: 0;
            font-size: 12px;
            color: #9ca3af;
            line-height: 1.4;
        }

        .scan-text {
            margin-top: 12px;
            font-size: 11px;
            color: #6b7280;
        }

        /* ========== MOBILE FIXES ========== */
        @media (max-width: 900px) {
            .main-container {
                padding: 0;
                gap: 0;
                max-width: 100%;
            }

            .qr-sidebar {
                display: none; /* Hide QR on mobile */
            }

            .device-frame {
                width: 100%;
                height: 100%;
                padding: 0;
                border-radius: 0;
                background: transparent;
                box-shadow: none;
            }

            .playable-wrapper {
                width: 100%;
                padding: 0;
            }
        }
    </style>
</head>
<body>

    <!-- Top Control Bar -->
    <div id="control-bar">
        <div style="display:flex; align-items:center; gap:10px; font-weight:600;">
            <span id="game-title">Idle Mine</span>
        </div>

        <div style="display:flex; align-items:center; gap:8px; font-size:12px;">
            <div style="display:flex; background:#27251f; border-radius:9999px; padding:2px; border:1px solid #3f3f46;">
                <button onclick="setOrientation('portrait')" 
                        style="padding:5px 14px; border-radius:9999px; border:none; background:#3f3f46; color:white; cursor:pointer; font-size:11px;">
                    📱 Portrait
                </button>
                <button onclick="setOrientation('landscape')" 
                        style="padding:5px 14px; border-radius:9999px; border:none; background:transparent; color:#a1a1aa; cursor:pointer; font-size:11px;">
                    📱 Landscape
                </button>
            </div>

            <button onclick="toggleFullscreen()" 
                    style="padding:6px 12px; background:#27251f; border:1px solid #3f3f46; border-radius:9999px; color:#a1a1aa; cursor:pointer; font-size:11px;">
                ⛶ Fullscreen
            </button>

            <button onclick="closePlayable()" 
                    style="padding:6px 12px; background:#450a0a; border:1px solid #7f1d1d; border-radius:9999px; color:#fda4af; cursor:pointer; font-size:11px;">
                ✕ Close
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-container">

        <!-- Playable -->
        <div class="playable-wrapper">
            <div class="device-frame">
                <iframe id="game-frame" src="playable.html" frameborder="0"></iframe>
            </div>
        </div>

        <!-- QR Code Sidebar -->
        <div class="qr-sidebar">
            <h3>Scan to Play</h3>
            <img id="qr-image" alt="QR Code">
            <p>Scan this QR code with your phone camera to play on mobile in fullscreen.</p>
            <div class="scan-text">Auto-generated • Always up to date</div>
        </div>

    </div>

    <script>
        const frame = document.getElementById('game-frame');

        function setOrientation(mode) {
            if (mode === 'portrait') {
                frame.style.maxWidth = '380px';
                frame.style.height = '640px';
                frame.style.borderRadius = '28px';
                frame.classList.remove('landscape');
            } else {
                frame.style.maxWidth = '720px';
                frame.style.height = '405px';
                frame.style.borderRadius = '24px';
                frame.classList.add('landscape');
            }
            frame.style.width = '100%';
        }

        function toggleFullscreen() {
            const elem = document.documentElement;
            if (!document.fullscreenElement) {
                elem.requestFullscreen?.();
            } else {
                document.exitFullscreen?.();
            }
        }

        function closePlayable() {
            if (confirm('Close this playable?')) {
                if (window.mraid && typeof mraid.close === 'function') {
                    mraid.close();
                } else {
                    window.close();
                }
            }
        }

        function init() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth <= 768;

            if (isMobile) {
                // Mobile: Make playable take almost full screen
                frame.style.width = '100%';
                frame.style.maxWidth = '100%';
                frame.style.height = 'calc(100vh - 52px)';
                frame.style.border = 'none';
                frame.style.borderRadius = '0';
                frame.style.margin = '0';
                frame.style.boxShadow = 'none';

                // Adjust device frame on mobile
                const deviceFrame = document.querySelector('.device-frame');
                if (deviceFrame) {
                    deviceFrame.style.padding = '0';
                    deviceFrame.style.background = 'transparent';
                    deviceFrame.style.boxShadow = 'none';
                    deviceFrame.style.borderRadius = '0';
                }

                // Hide QR sidebar on mobile
                const qrSidebar = document.querySelector('.qr-sidebar');
                if (qrSidebar) qrSidebar.style.display = 'none';

                // Prevent scroll bars
                document.body.style.overflow = 'hidden';
            } else {
                // Desktop
                setOrientation('portrait');
            }

            // Update title
            const titleEl = document.getElementById('game-title');
            if (titleEl && document.title) {
                titleEl.textContent = document.title.replace('• Playable', '').trim();
            }

            // Auto-generate QR code
            const playableUrl = window.location.href;
            const qrImg = document.getElementById('qr-image');
            if (qrImg) {
                qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(playableUrl)}`;
                qrImg.alt = 'QR Code - ' + playableUrl;
            }
        }

        window.onload = init;
    </script>
</body>
</html>
