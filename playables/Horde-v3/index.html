<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle Mine • Playable</title>
    <style>
        body {
            margin: 0;
            background: #0f0f11;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #e5e7eb;
            overflow-x: hidden;
        }

        .main-container {
            display: flex;
            gap: 24px;
            padding: 32px 24px 32px 24px;
            max-width: 1200px;
            margin: 0 auto;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            justify-content: center;
            padding-top: 32px;
            padding-bottom: 32px;
        }

        .playable-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: auto;
        }

        .device-frame {
            position: relative;
            padding: 18px;
            border-radius: 42px;
            background: linear-gradient(145deg, #2b2b31, #111114);
            box-shadow:
                0 25px 60px rgba(0,0,0,0.55),
                inset 0 2px 4px rgba(255,255,255,0.06),
                inset 0 -4px 8px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.06);
        }

        #game-frame {
            width: 100%;
            max-width: 420px;
            height: 760px;
            border: none;
            border-radius: 28px;
            overflow: hidden;
            display: block;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.6);
            background: #000;
            transition: all 0.3s ease;
        }

        .landscape {
            max-width: 900px;
            height: 506px;
            border-radius: 24px;
        }

        .qr-sidebar {
            width: 220px;
            background: #18181b;
            border: 1px solid #27251f;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .qr-sidebar img {
            width: 180px;
            height: 180px;
            border-radius: 12px;
            background: white;
            padding: 8px;
            margin-bottom: 12px;
        }

        .qr-sidebar h3 {
            margin: 0 0 8px 0;
            font-size: 15px;
            color: #f3e8ff;
        }

        .qr-sidebar p {
            margin: 0;
            font-size: 12px;
            color: #9ca3af;
            line-height: 1.4;
        }

        .scan-text {
            margin-top: 12px;
            font-size: 11px;
            color: #6b7280;
        }

        /* ========== MOBILE FIXES ========== */
        @media (max-width: 900px) {
            .main-container {
                padding: 16px;
                gap: 0;
                max-width: 100%;
                align-items: center;
                justify-content: center;
            }

            .qr-sidebar {
                display: none; /* Hide QR on mobile */
            }

            .device-frame {
                width: 100%;
                height: 100%;
                padding: 0;
                border-radius: 0;
                background: transparent;
                box-shadow: none;
            }

            .playable-wrapper {
                width: 100%;
                padding: 0;
            }
        }
    </style>
</head>
<body>

    <!-- Main Content -->
    <div class="main-container">

        <!-- Playable -->
        <div class="playable-wrapper">
            <div class="device-frame">
                <iframe id="game-frame" src="playable.html" frameborder="0"></iframe>
            </div>
        </div>

        <!-- QR Code Sidebar -->
        <div class="qr-sidebar">
            <h3>Scan to Play</h3>
            <img id="qr-image" alt="QR Code">
            <p>Scan this QR code with your phone camera to play on mobile in fullscreen.</p>
            <div class="scan-text">Auto-generated • Always up to date</div>
        </div>

    </div>

    <script>
        const frame = document.getElementById('game-frame');

        function setOrientation(mode) {
            if (mode === 'portrait') {
                frame.style.maxWidth = '420px';
                frame.style.height = '760px';
                frame.style.borderRadius = '28px';
                frame.classList.remove('landscape');
            } else {
                frame.style.maxWidth = '900px';
                frame.style.height = '506px';
                frame.style.borderRadius = '24px';
                frame.classList.add('landscape');
            }
            frame.style.width = '100%';
        }

        function init() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth <= 768;

            if (isMobile) {
                // Mobile: Make playable take almost full screen
                frame.style.width = '100%';
                frame.style.maxWidth = '100%';
                frame.style.height = '78vh';
                frame.style.border = 'none';
                frame.style.borderRadius = '0';
                frame.style.margin = '0';
                frame.style.boxShadow = 'none';

                // Adjust device frame on mobile
                const deviceFrame = document.querySelector('.device-frame');
                if (deviceFrame) {
                    deviceFrame.style.padding = '0';
                    deviceFrame.style.background = 'transparent';
                    deviceFrame.style.boxShadow = 'none';
                    deviceFrame.style.borderRadius = '0';
                }

                // Hide QR sidebar on mobile
                const qrSidebar = document.querySelector('.qr-sidebar');
                if (qrSidebar) qrSidebar.style.display = 'none';

                // Prevent scroll bars
                document.body.style.overflow = 'hidden';
            } else {
                // Desktop
                setOrientation('portrait');
            }

            // Auto-generate QR code
            const playableUrl = window.location.href;
            const qrImg = document.getElementById('qr-image');
            if (qrImg) {
                qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(playableUrl)}`;
                qrImg.alt = 'QR Code - ' + playableUrl;
            }
        }

        window.onload = init;
    </script>
</body>
</html>
