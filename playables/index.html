<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playable Preview .3</title>
    <style>
        body { 
            margin: 0; 
            background: #0f0f11; 
            font-family: system-ui; 
            color: #e5e7eb; 
            overflow-x: hidden;
        }

        .main-container { 
            display: flex; 
            flex-direction: row; 
            gap: 100px; 
            padding: 24px 8px; 
            max-width: 100%; 
            margin: 0; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            box-sizing: border-box;
        }

        .qr-sidebar { 
            width: 220px; 
            max-width: 220px;
            flex: 0 0 auto;
            background: #18181b; 
            border: 1px solid #27251f; 
            border-radius: 16px; 
            padding: 20px; 
            text-align: center; 
            flex-shrink: 0; 
        }

        .qr-sidebar img { 
            width: 180px; 
            height: 180px; 
            border-radius: 12px; 
            background: white; 
            padding: 8px; 
            margin-bottom: 12px; 
        }

        .playable-wrapper { 
            flex: 0 0 auto !important; 
            flex-grow: 0 !important;
            flex-shrink: 0 !important;
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        .device-frame { 
            padding: 12px; 
            border-radius: 42px; 
            background: linear-gradient(145deg, #2b2b31, #111114); 
            box-shadow: 0 25px 60px rgba(0,0,0,0.55); 
            width: fit-content; 
        }

        #game-frame { 
            width: 360px; 
            height: 640px; 
            aspect-ratio: 9 / 16; 
            border: none; 
            border-radius: 28px; 
            background: #000; 
            display: block; 
        }

        /* ========== IMPROVED MOBILE ========== */
        @media (max-width: 900px) {
            .main-container { 
                flex-direction: column; 
                padding: 16px; 
                gap: 16px; 
                align-items: center; 
            }

            .qr-sidebar { 
                display: none; 
            }

            .device-frame { 
                width: 100%; 
                max-width: 420px; 
                padding: 10px; 
                border-radius: 32px; 
                margin: 0 auto; 
            }

            #game-frame { 
                width: 100%; 
                height: 100%;           /* Fill the frame fully */
                aspect-ratio: 9 / 16; 
                border-radius: 24px; 
                border: none; 
                background: #000; 
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- QR Sidebar -->
        <div class="qr-sidebar">
            <h3>Scan to Play</h3>
            <img id="qr-image" alt="QR Code">
            <p style="margin:0; font-size:12px; color:#9ca3af;">Scan to play on mobile</p>
        </div>

        <!-- Playable -->
        <div class="playable-wrapper">
            <div class="device-frame">
                <iframe id="game-frame" src="" frameborder="0"></iframe>
            </div>
        </div>
    </div>

    <script>
        function init() {
            const params = new URLSearchParams(window.location.search);
            const gameId = params.get('game');

            if (!gameId) {
                document.body.innerHTML = `<h2 style="text-align:center; padding-top:100px;">Missing ?game= parameter</h2>`;
                return;
            }

            const frame = document.getElementById('game-frame');
            frame.src = `./${gameId}/playable.html`;

            // Auto QR
            const playableUrl = window.location.href;
            const qrImg = document.getElementById('qr-image');
            if (qrImg) {
                qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(playableUrl)}`;
            }

            const isMobile = /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth <= 768;
            
            if (isMobile) {
                // Mobile: Let the game fill the frame better
                frame.style.border = 'none';
                frame.style.boxShadow = 'none';
                
                // Optional: Try to make iframe fill more aggressively
                setTimeout(() => {
                    frame.style.height = 'calc(100vh - 80px)'; // Adjust if needed
                }, 100);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
