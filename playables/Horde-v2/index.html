<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playble preview</title>
    <style>
        body {
            margin: 0;
            background: #0f0f11;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #e5e7eb;
            overflow-x: hidden;
            overflow: hidden;
            height: 100vh;
        }

        .main-container {
            display: flex;
            gap: 24px;
            padding: 32px 24px 32px 24px;
            max-width: 1200px;
            margin: 0 auto;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            justify-content: center;
            padding-top: 32px;
            padding-bottom: 32px;
        }

        .qr-sidebar {
            width: 240px;
            background: #18181b;
            border: 1px solid #27251f;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .qr-sidebar img {
            width: 180px;
            height: 180px;
            border-radius: 12px;
            background: white;
            padding: 8px;
            margin-bottom: 12px;
        }

        .qr-sidebar h3 {
            margin: 0 0 8px 0;
            font-size: 15px;
            color: #f3e8ff;
        }

        .playable-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: auto;
        }

        .device-frame {
            position: relative;
            padding: 12px;
            border-radius: 42px;
            background: linear-gradient(145deg, #2b2b31, #111114);
            box-shadow:
                0 25px 60px rgba(0,0,0,0.55),
                inset 0 2px 4px rgba(255,255,255,0.06),
                inset 0 -4px 8px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.06);
            width: fit-content;
            margin: 0 auto;
        }

        #game-frame {
            height: 85vh;
            width: auto;
            aspect-ratio: 9 / 16;
            max-height: 960px;
            border: none;
            border-radius: 28px;
            overflow: hidden;
            display: block;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.6);
            background: #000;
            transition: all 0.3s ease;
        }

        .landscape {
            width: 90vw;
            height: calc(90vw * 0.5625);
            max-width: 960px;
            max-height: 540px;
            border-radius: 24px;
        }

        /* ========== MOBILE FIXES ========== */
        @media (max-width: 900px) {
            .main-container {
                padding: 16px;
                gap: 0;
                max-width: 100%;
                align-items: center;
                justify-content: center;
            }

            .qr-sidebar {
                display: none;
            }

            .device-frame {
                width: min(92vw, 420px);
                aspect-ratio: 9 / 16;
                padding: 10px;
                border-radius: 28px;
                background: linear-gradient(145deg, #2b2b31, #111114);
                box-shadow:
                    0 18px 40px rgba(0,0,0,0.45),
                    inset 0 2px 4px rgba(255,255,255,0.05),
                    inset 0 -4px 8px rgba(0,0,0,0.4);
                display: flex;
                justify-content: center;
                align-items: center;
            }

            #game-frame {
                width: 100%;
                height: 100%;
                border-radius: 22px;
                border: none;
                background: #000;
                display: block;
            }

            .playable-wrapper {
                width: 100%;
                padding: 0;
                display: flex;
                justify-content: center;
                align-items: center;
            }
        }
    </style>
</head>
<body>

    <!-- Main Content -->
    <div class="main-container">

        <!-- QR Sidebar (Left) -->
        <div class="qr-sidebar">
            <h3>Scan to Play</h3>
            <img id="qr-image" alt="QR Code">
            <p style="margin:0;font-size:12px;color:#9ca3af;line-height:1.4;">
                Scan this QR code with your phone camera to play on mobile in fullscreen.
            </p>
            <div style="margin-top:12px;font-size:11px;color:#6b7280;">
                Auto-generated • Always up to date
            </div>
        </div>

        <!-- Playable -->
        <div class="playable-wrapper">
            <div class="device-frame">
                <iframe id="game-frame" src="playable.html" frameborder="0"></iframe>
            </div>
        </div>

    </div>

    <script>
        const frame = document.getElementById('game-frame');

        function setOrientation(mode) {
            if (mode === 'landscape') {
                frame.style.width = '960px';
                frame.style.height = '540px';
                frame.style.aspectRatio = '16 / 9';
            } else {
                frame.style.width = '512px';
                frame.style.height = '512px';
                frame.style.aspectRatio = '1 / 1';
            }
        }

        function init() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth <= 768;

            if (isMobile) {
                // Mobile: clean full playable (no UI)
                frame.style.border = 'none';
                frame.style.boxShadow = 'none';
                frame.style.background = '#000';

                document.body.style.overflow = 'hidden';
            } else {
                // Desktop (default square preview)
                frame.style.width = '340px';
                frame.style.height = '660px';
                frame.style.aspectRatio = '1 / 1';
                frame.style.borderRadius = '28px';
                frame.style.boxShadow = '0 25px 50px -12px rgb(0 0 0 / 0.6)';
            }

            // Auto-generate QR code
            const playableUrl = window.location.href;
            const qrImg = document.getElementById('qr-image');
            if (qrImg) {
                qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(playableUrl)}`;
                qrImg.alt = 'QR Code - ' + playableUrl;
            }
        }

        window.onload = init;
    </script>
</body>
</html>
