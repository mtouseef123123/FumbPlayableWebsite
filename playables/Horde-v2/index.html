<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playable Preview</title>
    <style>
        body {
            margin: 0;
            background: #0f0f11;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #e5e7eb;
        }

        .main-container {
            display: flex;
            flex-direction: row;           /* Desktop: side by side */
            gap: 32px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
            align-items: flex-start;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .qr-sidebar {
            width: 240px;
            background: #18181b;
            border: 1px solid #27251f;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            flex-shrink: 0;
            position: sticky;
            top: 40px;
        }

        .qr-sidebar img {
            width: 180px;
            height: 180px;
            border-radius: 12px;
            background: white;
            padding: 8px;
            margin-bottom: 12px;
        }

        .qr-sidebar h3 {
            margin: 0 0 8px 0;
            font-size: 15px;
            color: #f3e8ff;
        }

        .playable-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .device-frame {
            position: relative;
            padding: 14px;
            border-radius: 42px;
            background: linear-gradient(145deg, #2b2b31, #111114);
            box-shadow: 
                0 25px 60px rgba(0,0,0,0.55),
                inset 0 2px 4px rgba(255,255,255,0.06),
                inset 0 -4px 8px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.06);
            width: fit-content;
        }

        #game-frame {
            width: 360px;
            height: 640px;
            aspect-ratio: 9 / 16;
            border: none;
            border-radius: 28px;
            background: #000;
            display: block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        /* ========== MOBILE ========== */
        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;     /* Mobile: QR below playable */
                padding: 24px 16px;
                gap: 24px;
                align-items: center;
            }

            .qr-sidebar {
                width: 100%;
                max-width: 280px;
                position: static;
            }

            .device-frame {
                width: min(92vw, 380px);
                padding: 12px;
                border-radius: 32px;
            }

            #game-frame {
                width: 100%;
                height: auto;
                aspect-ratio: 9 / 16;
                border-radius: 22px;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">

        <!-- QR Code Sidebar (Left on Desktop) -->
        <div class="qr-sidebar">
            <h3>Scan to Play</h3>
            <img id="qr-image" alt="QR Code">
            <p style="margin:0; font-size:12px; color:#9ca3af; line-height:1.4;">
                Scan this QR code with your phone camera to play on mobile.
            </p>
            <div style="margin-top:12px; font-size:11px; color:#6b7280;">
                Auto-generated
            </div>
        </div>

        <!-- Playable -->
        <div class="playable-wrapper">
            <div class="device-frame">
                <iframe id="game-frame" src="playable.html" frameborder="0"></iframe>
            </div>
        </div>

    </div>

    <script>
        function init() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth <= 768;
            const frame = document.getElementById('game-frame');

            if (isMobile) {
                frame.style.border = 'none';
                frame.style.boxShadow = 'none';
                document.body.style.overflow = 'auto';
            } else {
                // Desktop default size
                frame.style.width = '360px';
                frame.style.height = '640px';
                frame.style.aspectRatio = '9 / 16';
            }

            // Auto-generate QR Code
            const playableUrl = window.location.href;
            const qrImg = document.getElementById('qr-image');
            if (qrImg) {
                qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(playableUrl)}`;
            }
        }

        window.onload = init;
    </script>
</body>
</html>
