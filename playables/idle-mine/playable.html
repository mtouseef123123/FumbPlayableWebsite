<div style="padding: 40px 20px; text-align: center; background: linear-gradient(#1f2937, #111113); min-height: 100vh;">
    
    <div style="margin-bottom: 30px;">
        <div style="font-size: 48px; margin-bottom: 10px;">⛏️</div>
        <h1 style="font-size: 28px; margin: 0;">Idle Bitcoin Miner</h1>
        <p style="color: #9ca3af; margin-top: 8px;">Tap to mine • Build your empire</p>
    </div>

    <!-- Simple Clicker Demo -->
    <div onclick="mine()" 
         style="width: 160px; height: 160px; margin: 30px auto; background: linear-gradient(#facc15, #ca8a04); 
                border-radius: 9999px; display: flex; align-items: center; justify-content: center; 
                box-shadow: 0 10px 30px rgba(250, 204, 21, 0.4); cursor: pointer; user-select: none;">
        <div style="text-align: center; color: #713f12;">
            <div style="font-size: 42px;">⛏️</div>
            <div style="font-weight: 700; font-size: 13px; letter-spacing: 1px;">TAP TO MINE</div>
        </div>
    </div>

    <div style="margin-top: 20px;">
        <div style="font-size: 13px; color: #9ca3af;">BITCOIN MINED</div>
        <div id="btc" style="font-size: 42px; font-weight: 700; color: #facc15; font-variant-numeric: tabular-nums;">0</div>
    </div>

    <div style="margin-top: 40px; font-size: 12px; color: #666;">
        This is just a demo.<br>
        Replace this entire file with your real playable.
    </div>

</div>

<script>
    let btc = 0;

    function mine() {
        btc += 12;
        document.getElementById('btc').textContent = btc;

        // Bonus chance
        if (Math.random() < 0.1) {
            btc += 25;
            document.getElementById('btc').textContent = btc;
            showBonus();
        }
    }

    function showBonus() {
        const el = document.createElement('div');
        el.style.cssText = 'position:fixed; left:50%; top:35%; transform:translate(-50%,-50%); color:#facc15; font-weight:700; font-size:18px; pointer-events:none;';
        el.textContent = '+25 BONUS!';
        document.body.appendChild(el);

        setTimeout(() => {
            el.style.transition = 'all 0.6s ease';
            el.style.opacity = '0';
            setTimeout(() => el.remove(), 600);
        }, 400);
    }

    // Auto mining (idle)
    setInterval(() => {
        btc += 2;
        document.getElementById('btc').textContent = btc;
    }, 1200);

    console.log('%c[playable.html] Demo game loaded. Replace this file with your real game.', 'color:#666');
</script>
